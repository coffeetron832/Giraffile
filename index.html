<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Giraffile - La jirafa que cuida tu privacidad</title>
    <link rel="stylesheet" href="spots.css">
    <script src="https://unpkg.com/peerjs@1.5.4/dist/peerjs.min.js"></script>
    <script 
  src="https://cdn.jsdelivr.net/npm/qrcodejs@1.0.0/qrcode.min.js" 
  integrity="sha256-xUHvBjJ4hahBW8qN9gceFBibSFUzbe9PNttUvehITzY=" 
  crossorigin="anonymous">
</script>
</head>
<body>

    <div class="top-controls" style="display: flex; gap: 10px; align-items: center; justify-content: space-between; width: 100%; flex-wrap: wrap; margin-bottom: 20px;">
        <div>
            <button class="lang-toggle" onclick="toggleLanguage()" id="langBtn">English</button>
            <button class="theme-toggle" onclick="toggleTheme()" id="themeBtn">Modo Oscuro</button>
        </div>
    </div>

    <div id="main-wrapper" style="display: flex; flex-direction: column; gap: 20px; width: 100%; max-width: 1000px; margin: 0 auto;">
        
        <div class="layout-columns" style="display: flex; gap: 40px; justify-content: center; align-items: flex-start; flex-wrap: wrap;">
            
            <div class="column-left" style="flex: 1; min-width: 300px;">
                <div class="info-box" id="infoBoxContainer"></div>
            </div>

            <div class="column-right" style="flex: 1; min-width: 300px; display: flex; flex-direction: column; gap: 15px;">
                <h3 id="lblPrepare" style="margin-top: 0;">Prepara tu archivo para enviar</h3>
                
                <div class="control-group">
                    <label id="lblDropZone">Arrastra tu archivo o haz clic abajo (Máx 1.5GB):</label><br><br>
                    <div class="drop-zone" id="dropZone" onclick="document.getElementById('fileInput').click()">
                        <span id="dropZonePrompt">Arrastra un archivo aquí o haz clic para buscar</span>
                        <input type="file" id="fileInput" style="display: none;" onchange="manejarSeleccionArchivo(this)">
                    </div>
                    <p id="errorMsg" class="error"></p>
                </div>

                <div class="control-group">
                    <label id="lblExpiry">Tiempo de Caducidad:</label><br>
                    <select id="expiry" style="background: var(--box-bg); color: var(--text-color); border: 1px solid var(--box-border); padding: 6px; border-radius: 4px; margin-top: 5px; width: 100%;">
                        <option value="120" id="opt2m">2 Minutos</option>
                        <option value="300" id="opt5m">5 Minutos</option>
                        <option value="600" id="opt10m">10 Minutos</option> 
                    </select>
                </div>
                
                <button class="btn btn-primary" id="btnGenerar" onclick="generarLink()" style="width: 100%;">Generar enlace seguro</button>
                <div id="output"></div>
            </div>

        </div>

        <div id="preview" style="display: none; width: 100%; margin-top: 20px;">
            <h4 id="lblPreviewTitle">Visualizador de Archivo Seguro</h4>
            <div id="fileMeta" class="file-meta"></div>
            
            <div id="timerGroup" class="timer-container" style="display: none;">
                <div style="display: flex; justify-content: space-between; margin-bottom: 5px;">
                    <span id="lblTimeRemaining">Tiempo restante de visualización:</span>
                    <strong id="timeString">--:--</strong>
                </div>
                <progress id="lifeBar" value="100" max="100" style="width: 100%;"></progress>
            </div>

            <div id="fileContent" style="margin-top: 15px;"></div>
        </div>

    </div>

    <footer id="footerText" style="margin-top: 40px; text-align: center; width: 100%;">
        Giraffile v1.0.1 | © 2026 jahp. Todos los derechos reservados.
    </footer>

    <script src="brain.js"></script>
</body>
</html>
